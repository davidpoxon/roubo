id: ghe
name: GitHub Enterprise
version: 0.1.0
description: Bundled Roubo integration for self-hosted GitHub Enterprise Server. PAT + instance URL auth with optional self-signed TLS opt-in.
kind: integration
roubo: ^1.0.0
entry: ./dist/index.js
icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%231a2733"/><path fill="%23fff" d="M16 7c-4.97 0-9 4.03-9 9 0 3.98 2.58 7.35 6.16 8.54.45.08.61-.2.61-.43v-1.53c-2.5.54-3.03-1.2-3.03-1.2-.41-1.04-1-1.32-1-1.32-.81-.56.06-.55.06-.55.9.06 1.37.93 1.37.93.8 1.37 2.1.97 2.61.74.08-.58.31-.97.57-1.2-1.99-.23-4.09-1-4.09-4.44 0-.98.35-1.78.93-2.41-.1-.23-.4-1.15.09-2.4 0 0 .76-.24 2.48.92a8.62 8.62 0 014.52 0c1.72-1.16 2.48-.92 2.48-.92.49 1.25.19 2.17.09 2.4.58.63.93 1.43.93 2.41 0 3.45-2.1 4.2-4.1 4.43.32.28.6.83.6 1.67v2.48c0 .24.16.52.62.43A9 9 0 0025 16c0-4.97-4.03-9-9-9z"/><rect x="20" y="20" width="8" height="8" rx="2" fill="%230969da"/><path d="M22.2 23.5h3.6m-3.6 1.4h3.6" stroke="%23fff" stroke-width="0.8" stroke-linecap="round"/></svg>'
configSchema:
  type: object
  required:
    - instance
    - sources
  properties:
    instance:
      type: string
      title: GHE instance URL
      description: e.g. https://ghe.acme.example
      format: uri
    token:
      type: string
      title: Personal access token
      format: password
      description: GHE personal access token. Stored in the OS keyring.
    allowSelfSignedTls:
      type: boolean
      title: Allow self-signed TLS
      default: false
      description: Enable only for instances using self-signed certificates.
    sources:
      type: array
      items:
        type: object
        required:
          - kind
          - externalId
        properties:
          kind:
            type: string
            enum:
              - repo
              - project
          externalId:
            type: string
          includeCodeQLAlerts:
            type: boolean
            default: false
            description: When true, this source's CodeQL (code-scanning) alerts are pulled into the cut list.
          includeSecretScanningAlerts:
            type: boolean
            default: false
            description: When true, this source's secret-scanning alerts are pulled into the cut list.
          includeDependabotAlerts:
            type: boolean
            default: false
            description: When true, this source's Dependabot alerts are pulled into the cut list.
defaultIntegrationConfig:
  excludedStatuses:
    - Closed
    - Done
    - Resolved
    - In review
    - PR open
    - Waiting on reviewer
permissions:
  network:
    hosts:
      - "**"
  credentials:
    slots:
      - slot: token
        scope: read
        description: GitHub Enterprise personal access token.
  filesystem:
    paths: []
  processes: false
