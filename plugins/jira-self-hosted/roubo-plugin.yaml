id: jira-self-hosted
name: Self-hosted Jira
version: 0.1.0
description: Roubo integration for self-hosted Atlassian Jira (Data Center 8.14+). PAT auth, JQL incremental polling, configurable blocks / blocked-by link-type mapping.
kind: integration
roubo: ^1.0.0
entry: ./dist/index.js
icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%230052cc"/><path fill="%23fff" d="M15.45 8.5h.5l5.6 9.05a1 1 0 01-.85 1.52H6.3a1 1 0 01-.85-1.52L11.05 8.5a.5.5 0 01.42-.23h3.56c.16 0 .31.08.42.23zm.55 5.27l-2.7 4.4h5.4l-2.7-4.4z"/><path fill="%23fff" opacity="0.7" d="M19.55 14.95h.5l5.6 9.05a1 1 0 01-.85 1.52H10.4a1 1 0 01-.85-1.52l5.6-9.05a.5.5 0 01.42-.23h3.56c.16 0 .31.08.42.23z"/></svg>'
configSchema:
  type: object
  required:
    - instance
    - pat
  properties:
    instance:
      type: string
      title: Jira instance URL
      description: e.g. https://jira.acme.example
      format: uri
    pat:
      type: string
      title: Personal access token
      description: Data Center personal access token (8.14+). Stored in the OS keyring.
      format: password
    blocksLinkTypeName:
      type: string
      title: '"blocks" link-type name'
      default: blocks
      description: Override if your Jira admin renamed the default link type.
    isBlockedByLinkTypeName:
      type: string
      title: '"is blocked by" link-type name'
      default: is blocked by
    allowSelfSignedTls:
      type: boolean
      title: Allow self-signed TLS
      default: false
      description: Trust self-signed or internal-CA certificates for this instance. Only enable for an on-prem Jira whose certificate you trust; it disables certificate verification for every request to this instance.
defaultIntegrationConfig:
  # Category-first exclusion is the default and source of truth: the JQL builder
  # emits `statusCategory not in ("Done")`. The status-name list below is the
  # fallback used only when an instance does not support `statusCategory` in
  # JQL; it names the Done-category statuses so the fallback matches the intent.
  excludedStatusCategories:
    - Done
  excludedStatuses:
    - Closed
    - Done
    - Resolved
permissions:
  network:
    # The Jira instance host is user-supplied (configured per project), so the
    # static manifest cannot name a concrete host. The host constrains this `**`
    # to the configured instance host at the host.fetch boundary (#338); the
    # plugin also re-asserts it in `src/jira-client.ts` as defense-in-depth.
    hosts:
      - "**"
  credentials:
    slots:
      - slot: pat
        scope: read
        description: Jira personal access token (Data Center 8.14+).
      - slot: state
        scope: read-write
        description: Per-source last-poll timestamps. JSON-serialized.
  filesystem:
    paths: []
  processes: false
