id: github-com
name: GitHub.com
version: 0.1.0
description: Bundled integration for issues, projects, and repositories on GitHub.com.
kind: integration
roubo: ^1.0.0
entry: ./dist/index.js
icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%2324292f"/><path fill="%23fff" d="M16 6.5c-5.25 0-9.5 4.25-9.5 9.5 0 4.2 2.72 7.76 6.49 9.02.48.09.65-.21.65-.46v-1.61c-2.64.57-3.2-1.27-3.2-1.27-.43-1.1-1.05-1.4-1.05-1.4-.86-.59.06-.58.06-.58.95.07 1.45.98 1.45.98.84 1.44 2.21 1.03 2.75.78.08-.61.33-1.03.6-1.27-2.1-.24-4.32-1.05-4.32-4.68 0-1.04.37-1.88.98-2.55-.1-.24-.42-1.21.09-2.51 0 0 .8-.26 2.62.97a9.1 9.1 0 014.78 0c1.82-1.23 2.62-.97 2.62-.97.51 1.3.19 2.27.09 2.51.61.67.98 1.51.98 2.55 0 3.64-2.22 4.44-4.33 4.67.34.3.64.87.64 1.76v2.6c0 .25.17.55.66.46A9.5 9.5 0 0025.5 16c0-5.25-4.25-9.5-9.5-9.5z"/></svg>'
configSchema:
  type: object
  required:
    - sources
  properties:
    sources:
      type: array
      items:
        type: object
        required:
          - kind
          - externalId
        properties:
          kind:
            type: string
            enum:
              - repo
              - project
          externalId:
            type: string
          includeCodeQLAlerts:
            type: boolean
            default: false
            description: When true, this source's CodeQL (code-scanning) alerts are pulled into the cut list.
          includeSecretScanningAlerts:
            type: boolean
            default: false
            description: When true, this source's secret-scanning alerts are pulled into the cut list.
          includeDependabotAlerts:
            type: boolean
            default: false
            description: When true, this source's Dependabot alerts are pulled into the cut list.
defaultIntegrationConfig:
  excludedStatuses:
    - Closed
    - Done
    - Resolved
    - In review
    - PR open
    - Waiting on reviewer
permissions:
  network:
    hosts:
      - api.github.com
  credentials:
    slots:
      - slot: github-token
        scope: read
        description: Personal access token or OAuth token for GitHub.com
  filesystem:
    paths: []
  processes: false
