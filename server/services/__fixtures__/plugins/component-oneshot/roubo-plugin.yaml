# Test-only fixture manifest (NOT a shipped plugin, NOT in the marketplace seed
# catalog, NOT under e2e/fixtures so the plugin-grid discovery does not pick it
# up). It exists purely to give marketplace.test.ts a real on-disk component
# manifest that declares `lifecycle: one-shot`, so the annotate() derivation can
# be exercised against a real file (issue #401 / CP-TC-097) rather than a literal
# mock. It is intentionally manifest-only: readEntryManifest reads roubo-plugin.yaml
# and nothing loads the entry, so there is no dist/ or entry file.
id: component-oneshot
name: One-shot Component Fixture
version: 0.1.0
description: A one-shot component fixture whose start runs to completion and then reports completed. Used only to exercise the marketplace one-shot lifecycle derivation.
kind: component
roubo: ^1.0.0
entry: ./index.js
contractVersion: 1
descriptorSchemaVersion: 1
# The field under test: `one-shot` is what annotate() derives server-side so the
# marketplace detail drawer's Lifecycle row reads "one-shot" pre-install (#401).
lifecycle: one-shot
componentMode: imperative
configSchema:
  type: object
  properties: {}
permissions:
  network:
    hosts: []
  credentials:
    slots: []
  filesystem:
    paths: []
  processes:
    executables:
      - echo
