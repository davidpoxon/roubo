project:
  name: roubo
  displayName: Roubo
  repo: davidpoxon/roubo
  github:
    project: 1
layout:
  type: single-repo
components: {}
ports: {}
tools:
  - type: browser
    name: Web App
    icon: globe
    url: "{{urls.client}}"
    requires: client
  - type: shell
    name: VS Code
    icon: code
    command: code "{{workspace}}"
inspection:
  framework: vitest
  directory: .
  command: npx vitest run
benches:
  max: 6
  setup: npm ci
integration:
  plugin: github-com
  sources:
    Repository:
      - externalId: davidpoxon/roubo
        includeCodeQLAlerts: true
        includeSecretScanningAlerts: true
        includeDependabotAlerts: true
    Project:
      - externalId: davidpoxon/#1
