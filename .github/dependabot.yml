# Dependabot configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Notes on this repo:
# - npm workspaces (shared/, server/, client/, electron/) are declared in the
#   root package.json, so a single `npm` entry at `/` covers every workspace.
# - The DCO check in .github/workflows/dco.yml requires every commit to carry a
#   `Signed-off-by:` trailer matching the author email. Dependabot cannot emit
#   that trailer, so its author email is on the bot allowlist in dco.yml and
#   its commits are exempt from the per-commit check.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    cooldown:
      default-days: 30
      semver-major-days: 30
      semver-minor-days: 30
      semver-patch-days: 30
      include:
        - "*"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    cooldown:
      default-days: 30
      include:
        - "*"
