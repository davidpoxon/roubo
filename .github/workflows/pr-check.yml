name: pr-check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:em-dash
      # CP-NFR-006: fail the build if a component-type literal or a core
      # docker/compose field branch reappears in core (server/ + shared/).
      - run: npm run lint:component-guard

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx -w client tsc --noEmit
      - run: npx -w server tsc --noEmit

  # FR-023: prove the zod -> JSON Schema generate pipeline cannot drift from its
  # source. Regenerate every generated schema and fail if any committed output
  # differs. This now guards the real authored TestBench contracts
  # (schema/test-cases.schema.json, schema/test-results.schema.json) as well as
  # the retained #408 spike artifact. The roubo-config/roubo-plugin schemas are
  # hand-authored, not generated, so this guard does NOT gate on
  # schema/roubo-*.json (the diff would always fire on them).
  schema-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run generate:schema
      - name: Fail if any generated schema drifted from the zod source
        # The generator only writes the generated artifacts, so a clean tree
        # over all of schema/ means no drift. The hand-authored roubo-*.json
        # files are never touched by the generator, so they never trip this.
        run: git diff --exit-code -- schema/

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      # Build before coverage so the test job exercises the same built tree
      # (dist/ + tsconfig.tsbuildinfo residue) developers have after the
      # documented e2e flow, matching local `npm run build && npm test` (#878).
      # The #818 drift guard digests a source-only view, so build residue does
      # not make it flaky.
      - run: npm run build
      - run: npm run coverage

  e2e:
    uses: ./.github/workflows/e2e.yml
    with:
      run_index: 'pr-check'
    permissions:
      contents: read
      packages: read
