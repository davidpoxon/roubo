name: pr-check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:em-dash

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx -w client tsc --noEmit
      - run: npx -w server tsc --noEmit

  # Spike #408 (FR-023): prove the zod -> JSON Schema generate pipeline cannot
  # drift from its source. Regenerate the spike schema and fail if the committed
  # output differs. Scoped to the spike artifact only; running the generator
  # over the real authored schemas in production CI is #7 (out of scope here),
  # so this guard does NOT gate on schema/roubo-*.json.
  schema-drift:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run generate:schema
      - name: Fail if the generated schema drifted from the zod source
        run: git diff --exit-code -- schema/testbench-targeting.spike.schema.json

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run coverage

  e2e:
    uses: ./.github/workflows/e2e.yml
    with:
      run_index: 'pr-check'
    permissions:
      contents: read
      packages: read
