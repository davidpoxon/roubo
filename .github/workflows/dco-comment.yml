name: dco-comment

# Thin local caller for the reusable privileged DCO comment workflow. The
# comment logic lives in dco-comment-reusable.yml so it can be shared cross-repo
# via workflow_call; this stub owns the workflow_run trigger and passes the
# run-id / head-sha the reusable workflow needs.
on:
  workflow_run:
    workflows: [dco]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    uses: ./.github/workflows/dco-comment-reusable.yml
    with:
      run-id: ${{ github.event.workflow_run.id }}
      head-sha: ${{ github.event.workflow_run.head_sha }}
