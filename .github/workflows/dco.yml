name: dco

# Thin local caller for the reusable DCO check. The check logic lives in
# dco-reusable.yml so it can be shared cross-repo via workflow_call; this stub
# owns the pull_request trigger and concurrency that the reusable workflow
# deliberately leaves to its caller.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dco:
    uses: ./.github/workflows/dco-reusable.yml
