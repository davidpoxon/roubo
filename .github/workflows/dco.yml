name: dco

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  dco-check:
    name: DCO sign-off
    runs-on: ubuntu-latest
    # NOTE: `pull-requests: write` lets us post/update/delete the sticky failure
    # comment. For PRs from forks the `pull_request` GITHUB_TOKEN is read-only
    # regardless of this declaration; if we ever take external contributions,
    # move the comment step into a `workflow_run` follow-up workflow.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify DCO sign-off on every commit
        id: verify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF_SHA: ${{ github.event.pull_request.head.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Ensure the base commit is reachable in this checkout
          git fetch --no-tags --depth=1 origin "$BASE_SHA" 2>/dev/null || true

          commits=$(git log --no-merges --format='%H' "${BASE_SHA}".."${HEAD_SHA}")

          if [ -z "$commits" ]; then
            echo "No non-merge commits to check."
            echo "result=ok" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          missing=()
          for sha in $commits; do
            author_email=$(git log -1 --format='%ae' "$sha")
            body=$(git log -1 --format='%B' "$sha")

            # The sign-off must appear in the message and contain the author email.
            if ! printf '%s\n' "$body" | grep -qiE "^Signed-off-by: .+<.+@.+>$"; then
              missing+=("$sha")
              continue
            fi

            if ! printf '%s\n' "$body" | grep -qiE "^Signed-off-by: .+<${author_email}>$"; then
              missing+=("$sha")
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "All commits have a valid DCO sign-off."
            echo "result=ok" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build the failure body once and reuse it for both the job summary
          # and the sticky PR comment posted by the next step.
          {
            echo "<!-- dco-sticky-comment -->"
            echo "## DCO sign-off missing"
            echo ""
            echo "The following commit(s) are missing a valid \`Signed-off-by:\` line matching the commit author's email:"
            echo ""
            for sha in "${missing[@]}"; do
              subject=$(git log -1 --format='%s' "$sha")
              short=$(git log -1 --format='%h' "$sha")
              echo "- \`${short}\` ${subject}"
            done
            echo ""
            echo "### How to fix"
            echo ""
            echo "If only the most recent commit is missing sign-off:"
            echo ""
            echo '```bash'
            echo "git commit --amend --no-edit --signoff"
            echo "git push --force-with-lease"
            echo '```'
            echo ""
            echo "If multiple commits in this pull request are missing sign-off:"
            echo ""
            echo '```bash'
            echo "git rebase --signoff origin/${BASE_REF}"
            echo "git push --force-with-lease"
            echo '```'
            echo ""
            echo "See [CONTRIBUTING.md](${SERVER_URL}/${REPOSITORY}/blob/${HEAD_REF_SHA}/CONTRIBUTING.md#developer-certificate-of-origin-dco) for full instructions."
          } > dco-comment.md

          cat dco-comment.md >> "$GITHUB_STEP_SUMMARY"

          echo "result=missing" >> "$GITHUB_OUTPUT"
          echo "::error::One or more commits are missing DCO sign-off. See the job summary and the PR comment for the list and the fix."

      - name: Post or update sticky failure comment
        if: steps.verify.outputs.result == 'missing'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          marker='<!-- dco-sticky-comment -->'
          existing_id=$(gh api \
            --paginate \
            "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "map(select(.body | contains(\"${marker}\"))) | .[0].id // empty")

          if [ -n "$existing_id" ]; then
            gh api \
              --method PATCH \
              "repos/${REPO}/issues/comments/${existing_id}" \
              -F body=@dco-comment.md > /dev/null
            echo "Updated existing sticky comment id=${existing_id}."
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file dco-comment.md
            echo "Posted new sticky comment."
          fi

          # The verify step already emitted ::error::; fail the job here so the
          # comment is in place before the red check renders.
          exit 1

      - name: Clear stale sticky comment on success
        if: steps.verify.outputs.result == 'ok' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          marker='<!-- dco-sticky-comment -->'
          existing_id=$(gh api \
            --paginate \
            "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "map(select(.body | contains(\"${marker}\"))) | .[0].id // empty")

          if [ -n "$existing_id" ]; then
            # Best-effort: don't fail the job if the API hiccups.
            if gh api --method DELETE "repos/${REPO}/issues/comments/${existing_id}" > /dev/null; then
              echo "Deleted stale sticky comment id=${existing_id}."
            else
              echo "::warning::Failed to delete stale sticky comment id=${existing_id}."
            fi
          else
            echo "No stale sticky comment to clear."
          fi
