id: ghe
name: GitHub Enterprise
version: 0.1.0
description: E2E overlay that takes the bundled ghe plugin's slot during Playwright runs. Delegates runtime behaviour to the e2e-stub plugin so scenarios drive responses. Not for production.
kind: integration
roubo: ^1.0.0
entry: ./index.mjs
configSchema:
  type: object
  required:
    - instance
    - sources
  properties:
    instance:
      type: string
      title: GHE instance URL
      format: uri
    token:
      type: string
      title: Personal access token
      format: password
      description: PAT (e2e stub, value is not consulted by the stub plugin).
    sources:
      type: array
      items:
        type: object
        required:
          - kind
          - externalId
        properties:
          kind:
            type: string
          externalId:
            type: string
permissions:
  network:
    hosts: []
  credentials:
    slots: []
  filesystem:
    paths: []
  processes: false
