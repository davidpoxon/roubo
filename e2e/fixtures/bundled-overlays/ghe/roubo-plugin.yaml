id: ghe
name: GitHub Enterprise
version: 0.1.0
description: E2E overlay that takes the bundled ghe plugin's slot during Playwright runs. Delegates runtime behaviour to the e2e-stub plugin so scenarios drive responses. Not for production.
kind: integration
roubo: ^1.0.0
entry: ./index.mjs
configSchema:
  type: object
  required:
    - instance
    - sources
  properties:
    instance:
      type: string
      title: GHE instance URL
      format: uri
    token:
      type: string
      title: Personal access token
      # Intentionally NOT format: password. The Configure dialog's test
      # endpoint persists every `format: password` field to the OS keyring
      # before validateConfig runs (server/services/integration-test.ts:46-51),
      # and headless Ubuntu CI runners ship without `secret-tool`. Treating
      # the e2e overlay's token as a plain string keeps the field visible
      # in the dialog (ConfigSchemaForm renders all string properties) and
      # lets the GHE PAT-regeneration spec type into it without tripping
      # `credential-store-failed` on the second test-connection. The stub
      # plugin does not consult the token value, so the credential-store
      # bypass has no functional consequence for the spec.
      description: PAT (e2e stub, value is not consulted by the stub plugin).
    sources:
      type: array
      items:
        type: object
        required:
          - kind
          - externalId
        properties:
          kind:
            type: string
          externalId:
            type: string
permissions:
  network:
    hosts: []
  credentials:
    slots: []
  filesystem:
    paths: []
  processes: false
