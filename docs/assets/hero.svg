<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="Roubo dashboard placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="0" y="0" width="900" height="480" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="899" height="479" rx="13.5" fill="none" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="480" rx="14" fill="#fafaf9"/>
  <rect x="200" y="0" width="1" height="480" fill="#e7e5e4"/>

  <!-- Mortise-and-tenon mark + product name -->
  <g transform="translate(24, 28)">
    <rect x="0" y="2" width="14" height="28" rx="1.6" fill="#1c1917" opacity="0.35"/>
    <rect x="14" y="2" width="18" height="28" rx="1.6" fill="#1c1917" opacity="0.2"/>
    <rect x="9" y="10" width="16" height="14" rx="1.2" fill="#1c1917"/>
    <text x="50" y="22" font-family="ui-sans-serif, system-ui, Inter, sans-serif" font-size="13" font-weight="700" letter-spacing="2.5" fill="#1c1917">ROUBO</text>
  </g>

  <!-- Sidebar sections -->
  <g font-family="ui-sans-serif, system-ui, Inter, sans-serif" font-size="11" letter-spacing="1.5" fill="#a8a29e" font-weight="600">
    <text x="24" y="100">PROJECTS</text>
    <text x="24" y="232">BENCHES</text>
  </g>

  <!-- Project list -->
  <g font-family="ui-sans-serif, system-ui, Inter, sans-serif" font-size="13" fill="#292524">
    <rect x="14" y="116" width="172" height="32" rx="6" fill="#fef3c7" opacity="0.6"/>
    <text x="26" y="136">roubo</text>
    <text x="26" y="170">acme-platform</text>
    <text x="26" y="200">internal-tools</text>
  </g>

  <!-- Main pane title -->
  <g font-family="ui-sans-serif, system-ui, Inter, sans-serif">
    <text x="232" y="50" font-size="20" font-weight="600" fill="#1c1917">Benches</text>
    <text x="232" y="72" font-size="13" fill="#78716c">3 active across 2 projects</text>
    <!-- "Set up bench" button -->
    <rect x="772" y="32" width="100" height="32" rx="8" fill="#d97706"/>
    <text x="822" y="52" font-size="12" font-weight="500" fill="#ffffff" text-anchor="middle">Set up bench</text>
  </g>

  <!-- Bench cards -->
  <g font-family="ui-sans-serif, system-ui, Inter, sans-serif">

    <!-- Bench 1 (active) -->
    <rect x="232" y="100" width="640" height="100" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
    <rect x="232" y="100" width="3" height="100" rx="1.5" fill="#22c55e"/>
    <text x="252" y="128" font-size="14" font-weight="600" fill="#1c1917">Bench 1</text>
    <text x="252" y="148" font-size="12" fill="#78716c" font-family="ui-monospace, JetBrains Mono, monospace">main</text>
    <text x="252" y="180" font-size="11" fill="#a8a29e">roubo</text>

    <!-- status pills -->
    <g transform="translate(420, 124)">
      <rect x="0" y="0" width="80" height="22" rx="11" fill="#dcfce7"/>
      <circle cx="12" cy="11" r="3" fill="#22c55e"/>
      <text x="22" y="15" font-size="11" fill="#166534" font-weight="500">server</text>

      <rect x="92" y="0" width="80" height="22" rx="11" fill="#dcfce7"/>
      <circle cx="104" cy="11" r="3" fill="#22c55e"/>
      <text x="114" y="15" font-size="11" fill="#166534" font-weight="500">client</text>
    </g>

    <text x="420" y="172" font-size="11" font-family="ui-monospace, JetBrains Mono, monospace" fill="#78716c">:4100 · :4200</text>

    <!-- actions -->
    <rect x="780" y="118" width="72" height="28" rx="6" fill="#f5f5f4" stroke="#e7e5e4"/>
    <text x="816" y="136" font-size="11" fill="#44403c" text-anchor="middle">Stop</text>

    <!-- Bench 2 (active, different branch) -->
    <rect x="232" y="216" width="640" height="100" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
    <rect x="232" y="216" width="3" height="100" rx="1.5" fill="#22c55e"/>
    <text x="252" y="244" font-size="14" font-weight="600" fill="#1c1917">Bench 2</text>
    <text x="252" y="264" font-size="12" fill="#78716c" font-family="ui-monospace, JetBrains Mono, monospace">feat/parallel-runs</text>
    <text x="252" y="296" font-size="11" fill="#a8a29e">roubo</text>

    <g transform="translate(420, 240)">
      <rect x="0" y="0" width="80" height="22" rx="11" fill="#dcfce7"/>
      <circle cx="12" cy="11" r="3" fill="#22c55e"/>
      <text x="22" y="15" font-size="11" fill="#166534" font-weight="500">server</text>

      <rect x="92" y="0" width="80" height="22" rx="11" fill="#dcfce7"/>
      <circle cx="104" cy="11" r="3" fill="#22c55e"/>
      <text x="114" y="15" font-size="11" fill="#166534" font-weight="500">client</text>
    </g>

    <text x="420" y="288" font-size="11" font-family="ui-monospace, JetBrains Mono, monospace" fill="#78716c">:4101 · :4201</text>

    <rect x="780" y="234" width="72" height="28" rx="6" fill="#f5f5f4" stroke="#e7e5e4"/>
    <text x="816" y="252" font-size="11" fill="#44403c" text-anchor="middle">Stop</text>

    <!-- Bench 3 (preparing) -->
    <rect x="232" y="332" width="640" height="100" rx="10" fill="#ffffff" stroke="#e7e5e4"/>
    <rect x="232" y="332" width="3" height="100" rx="1.5" fill="#d97706"/>
    <text x="252" y="360" font-size="14" font-weight="600" fill="#1c1917">Bench 1</text>
    <text x="252" y="380" font-size="12" fill="#78716c" font-family="ui-monospace, JetBrains Mono, monospace">fix/login-bug</text>
    <text x="252" y="412" font-size="11" fill="#a8a29e">acme-platform</text>

    <g transform="translate(420, 356)">
      <rect x="0" y="0" width="92" height="22" rx="11" fill="#fef3c7"/>
      <circle cx="12" cy="11" r="3" fill="#d97706"/>
      <text x="22" y="15" font-size="11" fill="#92400e" font-weight="500">database</text>

      <rect x="104" y="0" width="80" height="22" rx="11" fill="#f5f5f4"/>
      <circle cx="116" cy="11" r="3" fill="#a8a29e"/>
      <text x="126" y="15" font-size="11" fill="#78716c" font-weight="500">backend</text>

      <rect x="196" y="0" width="80" height="22" rx="11" fill="#f5f5f4"/>
      <circle cx="208" cy="11" r="3" fill="#a8a29e"/>
      <text x="218" y="15" font-size="11" fill="#78716c" font-weight="500">frontend</text>
    </g>

    <text x="420" y="404" font-size="11" font-family="ui-monospace, JetBrains Mono, monospace" fill="#78716c">preparing · :1500 · :5100 · :5200</text>

    <rect x="780" y="350" width="72" height="28" rx="6" fill="#f5f5f4" stroke="#e7e5e4"/>
    <text x="816" y="368" font-size="11" fill="#44403c" text-anchor="middle">Clear</text>
  </g>

  <!-- "placeholder" watermark -->
  <text x="450" y="464" font-family="ui-sans-serif, system-ui, Inter, sans-serif" font-size="10" fill="#d6d3d1" text-anchor="middle" letter-spacing="2">PLACEHOLDER: REPLACE WITH PRODUCT SCREENSHOT</text>
</svg>
