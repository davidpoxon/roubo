<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Mortise piece (the receiving timber) -->
  <rect x="2" y="3" width="12" height="26" rx="1.5" fill="#f59e0b" opacity="0.35"/>
  <!-- Tenon piece (the inserted timber) -->
  <rect x="14" y="3" width="16" height="26" rx="1.5" fill="#f59e0b" opacity="0.2"/>
  <!-- The tenon projection, the joint itself, solid -->
  <rect x="8" y="10" width="14" height="12" rx="1" fill="#f59e0b"/>
</svg>
